<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מערכת איכון - בנות משה</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        h1 { text-align: center; background-color: #4CAF50; color: white; margin: 0; padding: 15px; }
        /* המפה תתפוס את כל שאר המסך */
        #map { height: calc(100vh - 60px); width: 100%; }
    </style>
</head>
<body>

    <h1>📍 מערכת איכון טיול שנתי - ירושלים</h1>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // יצירת המפה ומיקוד התחלתי על אזור ירושלים
        var map = L.map('map').setView([31.7683, 35.2137], 13);

        // טעינת מפת הרחובות
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // רשימה שתשמור את כל הסיכות (Markers) שיש כרגע על המפה
        var markers = {};

        // פונקציה שמושכת נתונים מהשרת שלנו ומעדכנת את המפה
        async function fetchLocations() {
            try {
                // קוראים לראוט שיצרנו בפייתון
                const response = await fetch('/api/locations');
                const locations = await response.json();

                // עוברים על כל מיקום שקיבלנו מהשרת
                locations.forEach(loc => {
                    let studentId = loc.StudentID;
                    let lat = loc.Latitude;
                    let lng = loc.Longitude;
                    let studentName = loc.FirstName + " " + loc.LastName;
                    let popupText = `<b>${studentName}</b><br>עודכן ב: ${loc.Timestamp}`;

                    // אם כבר יש סיכה לתלמידה הזו - רק נזיז אותה למיקום החדש
                    if (markers[studentId]) {
                        markers[studentId].setLatLng([lat, lng]);
                        markers[studentId].setPopupContent(popupText);
                    } 
                    // אם אין לה עדיין סיכה - ניצור אחת חדשה
                    else {
                        let newMarker = L.marker([lat, lng]).addTo(map);
                        newMarker.bindPopup(popupText);
                        markers[studentId] = newMarker;
                    }
                });
            } catch (error) {
                console.error("Error fetching locations:", error);
            }
        }

        // הפעלת הפונקציה מיד כשהדף עולה
        fetchLocations();

        // בקשת רענון אוטומטית כל 10 שניות (עדכון חי!)
        setInterval(fetchLocations, 10000);
    </script>
</body>
</html>
